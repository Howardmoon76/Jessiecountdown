<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Jessie Ward Countdown Hub</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd, #c2ffd8);
min-height: 100vh;
color: #222;
}

header {
text-align: center;
padding: 35px 15px 20px;
}

header h1 {
font-size: 2.4rem;
margin: 0;
}

header p {
font-size: 1rem;
margin-top: 8px;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
gap: 20px;
padding: 25px;
max-width: 1200px;
margin: auto;
}

.card {
background: white;
border-radius: 24px;
padding: 22px;
text-align: center;
box-shadow: 0 10px 25px rgba(0,0,0,0.15);
border: 4px solid rgba(255,255,255,0.6);
cursor: pointer;
transition: transform 0.2s ease;
}

.card:hover {
transform: scale(1.03);
}

.icon {
font-size: 3rem;
margin-bottom: 10px;
}

.card h2 {
margin: 8px 0;
font-size: 1.3rem;
}

.date {
font-size: 0.9rem;
opacity: 0.75;
margin-bottom: 15px;
}

.countdown {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
}

.time-box {
background: #f4f4f4;
border-radius: 14px;
padding: 10px 4px;
}

.num {
font-size: 1.3rem;
font-weight: bold;
}

.label {
font-size: 0.7rem;
text-transform: uppercase;
}

.done {
font-weight: bold;
font-size: 1.1rem;
color: #ff4b7d;
margin-top: 12px;
}
</style>
</head>

<body>

<header>
<h1>🎉 The Jessie Ward Countdown Hub 🎉</h1>
<p>Tap any card for confetti!</p>
</header>

<div class="grid" id="countdownGrid"></div>

<script>
const events = [
{
title: "Jessie's Birthday",
date: "2027-05-08T12:00:00",
icon: "🎂"
},
{
title: "Gran Canaria Holiday",
date: "2026-08-14T09:00:00",
icon: "☀️"
},
{
title: "MK Thunder First Home Game",
date: "2026-09-05T18:30:00",
icon: "🥅"
},
{
title: "End of Season Party",
date: "2026-05-30T19:00:00",
icon: "🏒🎉"
},
{
title: "Dad's Birthday",
date: "2026-08-25T12:00:00",
icon: "🎂"
},
{
title: "Mum's Birthday",
date: "2026-11-20T00:00:00",
icon: "🎂"
}
];

function updateCountdowns() {
const grid = document.getElementById("countdownGrid");
grid.innerHTML = "";

events.sort((a, b) => new Date(a.date) - new Date(b.date));

events.forEach(event => {
const now = new Date();
const target = new Date(event.date);
const diff = target - now;

let content = "";

if (diff <= 0) {
content = `<div class="done">It's here! 🎉</div>`;
} else {
const days = Math.floor(diff / (1000 * 60 * 60 * 24));
const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
const minutes = Math.floor((diff / (1000 * 60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);

content = `
<div class="countdown">
<div class="time-box"><div class="num">${days}</div><div class="label">Days</div></div>
<div class="time-box"><div class="num">${hours}</div><div class="label">Hrs</div></div>
<div class="time-box"><div class="num">${minutes}</div><div class="label">Mins</div></div>
<div class="time-box"><div class="num">${seconds}</div><div class="label">Secs</div></div>
</div>
`;
}

grid.innerHTML += `
<div class="card" onclick="party()">
<div class="icon">${event.icon}</div>
<h2>${event.title}</h2>
<div class="date">${target.toLocaleDateString("en-GB", {
weekday: "short",
day: "numeric",
month: "long",
year: "numeric",
hour: "2-digit",
minute: "2-digit"
})}</div>
${content}
</div>
`;
});
}

function party() {
confetti({
particleCount: 120,
spread: 80,
origin: { y: 0.6 }
});
}

updateCountdowns();
setInterval(updateCountdowns, 1000);
</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
